<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auth</title>

  <link rel="stylesheet" href="../CSS/navbar.css">
  <link rel="stylesheet" href="../CSS/pages/auth.css">

  <!-- ✅ Load JS safely -->
  <script src="../javascript/comp/auth.js" defer></script>
  <script src="../javascript/main.js" defer></script>
  
</head>

<body>

<div id="login-navbar"></div>

<div class="container" id="container">

  <!-- LOGIN -->
  <div class="form-container login-container">
    <form id="loginForm">
      <h1>Welcome Back</h1>

      <input id="loginEmail" type="email" placeholder="Email" required>
      <input id="loginPassword" type="password" placeholder="Password" required>

      <button type="submit">Sign In</button>
    </form>
  </div>

  <!-- REGISTER -->
  <div class="form-container register-container">
    <form id="registerForm">
      <h1>Create Account</h1>

      <input id="registerName" type="text" placeholder="Name" required>
      <input id="registerEmail" type="email" placeholder="Email" required>
      <input id="registerPassword" type="password" placeholder="Password" required>
      <input id="confirmPassword" type="password" placeholder="Confirm Password" required>

      <button type="submit">Sign Up</button>
    </form>
  </div>

  <!-- TOGGLE -->
  <div class="overlay-container">
    <div class="overlay">

      <div class="overlay-panel">
        <h1>Already with us?</h1>
        <button id="loginBtn">Login</button>
      </div>

      <div class="overlay-panel">
        <h1>New Here?</h1>
        <button id="registerBtn">Register</button>
      </div>

    </div>
  </div>

</div>

<div id="toast"></div>

</body>
</html>
